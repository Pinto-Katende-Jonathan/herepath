name: Feature request
description: Suggest an idea for herepath
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this solve? What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you'd like.
    validations:
      required: false
  - type: markdown
    attributes:
      value: >
        Note: herepath intentionally keeps a small surface mirroring the R `here`
        package. More powerful root-finding may be better suited to user code.
